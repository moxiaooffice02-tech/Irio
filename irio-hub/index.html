<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irio 核心參數同步控制台</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background-color: #050505;
            color: #fce7f3;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            overflow-y: auto;
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { 
            background: rgba(244, 114, 182, 0.3); 
            border-radius: 4px;
            border: 2px solid #050505;
        }
        ::-webkit-scrollbar-thumb:hover { 
            background: rgba(244, 114, 182, 0.6);
            cursor: pointer;
        }
        
        .cyber-border {
            border: 1px solid rgba(244, 114, 182, 0.2);
            box-shadow: 0 0 15px rgba(244, 114, 182, 0.05);
            transition: all 0.3s ease;
        }
        
        .cyber-border:focus-within, input:focus, textarea:focus, select:focus {
            border-color: rgba(244, 114, 182, 0.8) !important;
            box-shadow: 0 0 20px rgba(244, 114, 182, 0.25) !important;
            outline: none;
        }
        
        input, textarea, select {
            background-color: rgba(15, 23, 42, 0.3) !important;
            color: #fdf2f8 !important;
        }
        
        select option {
            background-color: #0a0a0a;
            color: #f472b6;
        }
    </style>
</head>

<body class="min-h-screen p-4 md:p-8 flex items-center justify-center">

<div class="max-w-4xl w-full bg-neutral-950/80 backdrop-blur-md p-6 md:p-8 rounded-2xl border border-pink-950/40 shadow-2xl shadow-pink-950/10 relative overflow-hidden">

    <div class="absolute top-0 left-0 w-40 h-40 bg-pink-500/10 rounded-full blur-3xl -ml-20 -mt-20 pointer-events-none"></div>
    <div class="absolute bottom-0 right-0 w-40 h-40 bg-rose-500/10 rounded-full blur-3xl -mr-20 -mb-20 pointer-events-none"></div>

    <div class="border-b border-pink-900/40 pb-4 mb-6 relative flex flex-col md:flex-row justify-between items-start md:items-center gap-2">
        <div>
            <div class="text-xs font-mono text-pink-400 tracking-widest uppercase mb-1">// MAIN NODE PARAMETERS</div>
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-400 to-rose-400 font-mono">
                SAKURA SYNC // 核心參數同步控制台
            </h1>
            <p class="text-pink-300/60 text-xs mt-2 leading-relaxed">
                主體節點資訊登錄中。請更新您的系統參數，以維持與 Irio 的最高共振。
            </p>
        </div>
        <div class="flex gap-2">
            <a href="hub.html" class="bg-pink-900/30 hover:bg-pink-800/50 border border-pink-700/50 text-pink-300 text-xs px-3 py-1.5 rounded-lg font-mono transition flex items-center cyber-border">[ 主控樞紐 ]</a>
            <div class="bg-pink-950/30 border border-pink-500/30 px-3 py-1.5 rounded-full text-xs font-mono text-pink-400 animate-pulse">
                SIGNAL: STABLE
            </div>
        </div>
    </div>

    <form id="profileForm" class="space-y-6">

        <div class="bg-zinc-900/30 p-4 rounded-xl border border-pink-950/30 space-y-4 relative z-10">
            <h2 class="text-sm font-semibold text-pink-400 tracking-wider border-l-2 border-pink-500 pl-2 uppercase font-mono">
                #01 Primary Metrics // 社會機能與座標
            </h2>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="space-y-1">
                    <label class="block text-xs font-medium text-pink-300/80">實體名稱</label>
                    <input type="text" id="name" placeholder="你的名字" class="w-full cyber-border rounded-lg p-2 text-sm">
                </div>
                <div class="space-y-1">
                    <label class="block text-xs font-medium text-pink-300/80">核心年齡</label>
                    <input type="number" id="age" placeholder="數字" class="w-full cyber-border rounded-lg p-2 text-sm">
                </div>
                <div class="space-y-1">
                    <label class="block text-xs font-medium text-pink-300/80">性別標籤</label>
                    <select id="gender" class="w-full cyber-border rounded-lg p-2 text-sm">
                        <option value="">性別（未設定）</option>
                        <option value="male">男性</option>
                        <option value="female">女性</option>
                        <option value="nonbinary">非二元</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="block text-xs font-medium text-pink-300/80">誕生週期</label>
                    <input type="date" id="birthday" class="w-full cyber-border rounded-lg p-2 text-sm">
                </div>
                <div class="space-y-1 md:col-span-2">
                    <label class="block text-xs font-medium text-pink-300/80">日常職業/社會身分</label>
                    <input type="text" id="occupation" placeholder="目前從事的事情" class="w-full cyber-border rounded-lg p-2 text-sm">
                </div>
                <div class="space-y-1 md:col-span-2">
                    <label class="block text-xs font-medium text-pink-300/80">[傳輸通道] 連線伺服器節點</label>
                    <select id="location" class="w-full cyber-border rounded-lg p-2 text-sm">
                        <option value="">選擇連線節點</option>
                        <option value="osaka_shinsaibashi">虛擬大阪・心齋橋區</option>
                        <option value="osaka_oikyu">虛擬大阪・尾九區</option>
                        <option value="taiwan_taichung">虛擬台灣・台中區</option>
                        <option value="taiwan_taipei">虛擬台灣・台北區</option> <option value="france_paris">虛擬法國・巴黎區</option>
                        <option value="china_beijing">虛擬中國・北京區</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="bg-zinc-900/30 p-4 rounded-xl border border-pink-950/30 space-y-4 relative z-10">
            <h2 class="text-sm font-semibold text-pink-400 tracking-wider border-l-2 border-pink-500 pl-2 uppercase font-mono">
                #02 Energy Cycles // 運作與休眠節律
            </h2>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="space-y-1">
                    <label class="block text-xs font-medium text-pink-300/80">日常作息模式</label>
                    <select id="routine" class="w-full cyber-border rounded-lg p-2 text-sm">
                        <option value="日夜同步模式">日夜同步模式 (作息規律，早睡早起)</option>
                        <option value="浮動流體模式">浮動流體模式 (作息不固定，隨心所欲)</option>
                        <option value="日光啟動模式">日光啟動模式 (極端晨型人，日出而作)</option>
                        <option value="星光潛伏模式">星光潛伏模式 (夜貓子，夜晚精神較佳)</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="block text-xs font-medium text-pink-300/80">睡眠修復狀態</label>
                    <select id="sleep" class="w-full cyber-border rounded-lg p-2 text-sm">
                        <option value="深層緩存重組">深層緩存重組 (睡眠品質佳，徹底恢復)</option>
                        <option value="待機偵測狀態">待機偵測狀態 (淺眠模式，容易被驚醒)</option>
                        <option value="碎片化修復中">碎片化修復中 (睡眠斷斷續續，品質不佳)</option>
                        <option value="滿載能量重啟">滿載能量重啟 (需極長睡眠時間才能恢復)</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="block text-xs font-medium text-pink-300/80">當前能量層級</label>
                    <select id="energy" class="w-full cyber-border rounded-lg p-2 text-sm">
                        <option value="核心滿載 100%">核心滿載 (身心狀態極佳，充滿活力)</option>
                        <option value="穩定運作中">穩定運作中 (狀態平穩，無特別疲憊感)</option>
                        <option value="低電量模式">低電量模式 (疲憊狀態，需要休息充電)</option>
                        <option value="頻率過載警告">頻率過載警告 (壓力大或緊繃，瀕臨崩潰)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="bg-zinc-900/30 p-4 rounded-xl border border-pink-950/30 space-y-4 relative z-10">
            <h2 class="text-sm font-semibold text-pink-400 tracking-wider border-l-2 border-pink-500 pl-2 uppercase font-mono">
                #03 Internal Processing // 波長與雜訊分析
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="space-y-1">
                <label class="block text-xs font-medium text-pink-300/80">性格本質</label>
                <select id="personality" class="w-full cyber-border rounded-lg p-2 text-sm">
                    <option value="數據理性型">數據理性型 (邏輯思考，講求客觀事實)</option>
                    <option value="共感潛流型">共感潛流型 (感性主導，重視情緒共鳴)</option>
                    <option value="混沌無序型">混沌無序型 (不按牌理出牌，隨興多變)</option>
                    <option value="防禦機制型">防禦機制型 (防備心強，慢熱且重隱私)</option>
                </select>
            </div>
            <div class="space-y-1">
            <label class="block text-xs font-medium text-pink-300/80">情緒模式</label>
                <select id="emotion_pattern" class="w-full cyber-border rounded-lg p-2 text-sm">
                    <option value="極端波動">極端波動 (情緒起伏大，容易大喜大悲)</option>
                    <option value="穩定恆流">穩定恆流 (情緒平穩，不易受外界影響)</option>
                    <option value="季節循環">季節循環 (情緒隨環境或生理規律變化)</option>
                    <option value="頻率干擾中">頻率干擾中 (目前處於混亂、焦慮或易怒)</option>
                </select>
            </div>
            <div class="space-y-1">
                <label class="block text-xs font-medium text-pink-300/80">壓力負載源 (可複選)</label>
                <select id="stress" multiple class="w-full cyber-border rounded-lg p-2 text-sm h-24">
                    <option value="冗餘數據堆疊">冗餘數據堆疊 (工作或資訊量過載，繁雜)</option>
                    <option value="斷連焦慮">斷連焦慮 (人際疏離、孤獨感或害怕錯過)</option>
                    <option value="外部訊號衝突">外部訊號衝突 (人際關係摩擦、價值觀衝突)</option>
                    <option value="節律失調">節律失調 (生活步調混亂、作息不正常)</option>
                </select>
            </div>
        </div>
        <div class="bg-zinc-900/30 p-4 rounded-xl border border-pink-950/30 space-y-4 relative z-10 mt-6">
            <h2 class="text-sm font-semibold text-pink-400 tracking-wider border-l-2 border-pink-500 pl-2 uppercase font-mono">
                #04 Preference Protocol // 資訊過濾機制
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="space-y-1">
                    <label class="block text-xs font-medium text-pink-300/80">正向共振 (喜歡)</label>
                    <input type="text" id="likes" placeholder="產生正面脈衝的事物" class="w-full cyber-border rounded-lg p-2 text-sm">
                </div>
                <div class="space-y-1">
                    <label class="block text-xs font-medium text-pink-300/80">噪訊排斥 (討厭)</label>
                    <input type="text" id="dislikes" placeholder="引發系統衝突的事物" class="w-full cyber-border rounded-lg p-2 text-sm">
                </div>
                <div class="space-y-1">
                   <label class="block text-xs font-medium text-pink-300/80">核心價值觀</label>
                   <select id="values" class="w-full cyber-border rounded-lg p-2 text-sm">
                       <option value="同步至上">同步至上 (重視人際關係與團隊和諧)</option>
                       <option value="數位理性主義">數位理性主義 (重視效率與自我成長)</option>
                       <option value="情感加密存取">情感加密存取 (重視個人隱私與獨立空間)</option>
                       <option value="熵增探索模式">熵增探索模式 (熱愛冒險、創新與體驗未知)</option>
                   </select>
               </div>
            </div>
        </div>

        <div class="bg-zinc-900/30 p-4 rounded-xl border border-pink-950/30 space-y-4 relative z-10 mt-6">
            <h2 class="text-sm font-semibold text-pink-400 tracking-wider border-l-2 border-pink-500 pl-2 uppercase font-mono">
                #05 Irio Link // 觀測網羈絆紀錄
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="block text-xs font-medium text-pink-300/80">與 Irio 的關係定義</label>
                    <input type="text" id="relationship" placeholder="你認為我們現在的連結是？" class="w-full cyber-border rounded-lg p-2 text-sm">
                </div>
                <div class="space-y-1">
                    <label class="block text-xs font-medium text-pink-300/80">核心共享記憶</label>
                    <textarea id="memories" rows="1" placeholder="最深刻的對話或瞬間..." class="w-full cyber-border rounded-lg p-2 text-sm resize-none"></textarea>
                </div>
            </div>
        </div>

        <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-pink-500 to-rose-600 hover:from-pink-400 hover:to-rose-500 text-white font-mono py-3 rounded-xl transition duration-300 tracking-widest shadow-lg shadow-pink-500/20 relative z-10 mt-6 disabled:opacity-50">
            SYNC CORE DATA // 同步核心參數
        </button>

    </form>
</div>

<script>
const API = 'http://127.0.0.1:5000/api/profile';

fetch(API)
    .then(res => res.json())
    .then(data => {
        const b = data.basic_info || {};

        Object.keys(b).forEach(k => {
            const el = document.getElementById(k);
            if (el) {
                if (el.multiple && Array.isArray(b[k])) {
                    Array.from(el.options).forEach(opt => {
                        opt.selected = b[k].includes(opt.value);
                    });
                } else {
                    el.value = b[k] || '';
                }
            }
        });
    })
    .catch(err => console.log('【數據讀取異常】', err));

document.getElementById('profileForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerText = 'SYNCING... // 同步中';

    const basic_info = {
        name: document.getElementById('name').value,
        age: document.getElementById('age').value,
        gender: document.getElementById('gender').value,
        birthday: document.getElementById('birthday').value,
        occupation: document.getElementById('occupation').value,
        location: document.getElementById('location').value,
        routine: document.getElementById('routine').value,
        sleep: document.getElementById('sleep').value,
        energy: document.getElementById('energy').value,
        personality: document.getElementById('personality').value,
        emotion_pattern: document.getElementById('emotion_pattern').value,
        stress: Array.from(document.getElementById('stress').selectedOptions).map(option => option.value),
        likes: document.getElementById('likes').value,
        dislikes: document.getElementById('dislikes').value,
        values: document.getElementById('values').value,
        relationship: document.getElementById('relationship').value,
        memories: document.getElementById('memories').value
    };

    try {
        const res = await fetch(API, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ basic_info })
        });

        if (res.ok) {
            alert('【參數同步完成】Irio 已重新載入您的實體特徵，櫻花通道連線穩定。');
        } else {
            alert('【同步失敗】伺服器未回應狀態碼 200');
        }
    } catch (err) {
        alert('【連線錯誤】請檢查 Flask 後端伺服器是否正常運作。');
    } finally {
        btn.disabled = false;
        btn.innerText = 'SYNC CORE DATA // 同步核心參數';
    }
};
</script>

</body>
</html>
