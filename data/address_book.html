<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>實體通訊矩陣：觀測網目錄</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background-color: #030303; color: #fce7f3; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; overflow-y: auto; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #030303; }
        ::-webkit-scrollbar-thumb { background: rgba(244, 114, 182, 0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(244, 114, 182, 0.6); }
        
        /* 賽博朋克外發光與邊框 */
        .cyber-border { border: 1px solid rgba(244, 114, 182, 0.12); transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .cyber-border:hover { border-color: rgba(244, 114, 182, 0.3); }
        .cyber-border:focus-within, input:focus { border-color: rgba(244, 114, 182, 0.8) !important; box-shadow: 0 0 20px rgba(244, 114, 182, 0.25); outline: none; }
        
        /* 面板展開動畫 */
        .detail-panel { max-height: 0; overflow: hidden; transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s, border-top-color 0.3s; opacity: 0; border-top: 1px solid transparent; }
        .detail-panel.open { max-height: 1200px; opacity: 1; }
        .arrow-icon { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* 🚀 擴充：高級互動資料卡特殊樣式 */
        .link-item { 
            transition: transform 0.1s ease-out, background-color 0.35s, border-color 0.35s, box-shadow 0.35s; 
            position: relative; 
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }
        .link-item::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 0px; background: linear-gradient(to bottom, #f472b6, #e11d48); transition: width 0.2s ease; z-index: 10; }
        .link-item:hover::before { width: 3px; }
        .link-item:hover { background-color: rgba(244, 114, 182, 0.03); }

        /* 雷射矩陣掃描線 */
        .link-item::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 48%, rgba(244, 114, 182, 0.3) 50%, transparent 52%);
            background-size: 100% 16px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1;
        }
        .link-item:hover::after {
            opacity: 0.08;
            animation: matrix-scan 2s linear infinite;
        }
        @keyframes matrix-scan {
            0% { background-position: 0 -100px; }
            100% { background-position: 0 400px; }
        }

        /* 全像表面炫光折射 */
        .shimmer-layer {
            position: absolute;
            top: 0; left: -150%; width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(244, 114, 182, 0.15), transparent);
            transform: skewX(-25deg);
            pointer-events: none;
            z-index: 2;
        }
        .link-item:hover .shimmer-layer {
            animation: laser-sheen 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        @keyframes laser-sheen {
            100% { left: 150%; }
        }

        /* 資訊噪點微故障 */
        .glitch-hover:hover {
            animation: cyber-glitch 0.25s linear infinite alternate-reverse;
        }
        @keyframes cyber-glitch {
            0% { text-shadow: -1.5px -1px 0px rgba(34, 211, 238, 0.7), 1.5px 1px 0px rgba(244, 114, 182, 0.7); }
            100% { text-shadow: 1.5px -1.5px 0px rgba(34, 211, 238, 0.7), -1.5px 1.5px 0px rgba(244, 114, 182, 0.7); transform: translate(0.5px, -0.5px); }
        }

        /* 量子共振衝擊波漣漪 */
        .matrix-ripple {
            position: absolute;
            border: 1px solid rgba(244, 114, 182, 0.7);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0);
            animation: ripple-shockwave 0.45s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
            box-shadow: 0 0 12px rgba(244, 114, 182, 0.4), inset 0 0 6px rgba(244, 114, 182, 0.2);
            z-index: 5;
        }
        @keyframes ripple-shockwave {
            to { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
        }

        /* 分類按鈕滑動線特效 */
        .filter-btn { position: relative; transition: all 0.3s ease; }
        .filter-btn.active { color: #f472b6; text-shadow: 0 0 8px rgba(244, 114, 182, 0.5); }
        .filter-btn::after { content: ''; position: absolute; bottom: -2px; left: 50%; width: 0; height: 2px; background-color: #f472b6; transition: all 0.3s ease; transform: translateX(-50%); box-shadow: 0 0 8px #f472b6; }
        .filter-btn.active::after { width: 80%; }
        
        /* 數值脈衝 */
        .pulse-text { animation: textGlow 2s infinite alternate; }
        @keyframes textGlow { from { text-shadow: 0 0 2px rgba(244,114,182,0.2); } to { text-shadow: 0 0 8px rgba(244,114,182,0.6); } }

        /* 👑 獨佔聚焦霓虹外框與浮凸效果 👑 */
        .focus-confidential { border-color: rgba(244, 63, 94, 0.7) !important; box-shadow: 0 0 25px rgba(244, 63, 94, 0.35) !important; }
        .focus-physical { border-color: rgba(16, 185, 129, 0.7) !important; box-shadow: 0 0 25px rgba(16, 185, 129, 0.35) !important; }
        .focus-virtual { border-color: rgba(34, 211, 238, 0.7) !important; box-shadow: 0 0 25px rgba(34, 211, 238, 0.35) !important; }
        .focus-hybrid { border-color: rgba(217, 70, 239, 0.7) !important; box-shadow: 0 0 25px rgba(217, 70, 239, 0.35) !important; }
    </style>
</head>

<body class="min-h-screen p-4 md:p-8 flex flex-col items-center justify-start relative bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-zinc-900/50 via-zinc-950 to-black">
<div class="fixed top-0 left-0 w-96 h-96 bg-pink-500/5 rounded-full blur-3xl -ml-48 -mt-48 pointer-events-none animate-pulse"></div>
<div class="fixed bottom-0 right-0 w-96 h-96 bg-rose-500/5 rounded-full blur-3xl -mr-48 -mb-48 pointer-events-none animate-pulse" style="animation-delay: 1.5s;"></div>

<div class="max-w-6xl w-full relative z-10 my-auto grid grid-cols-1 md:grid-cols-4 gap-6">

    <div class="md:col-span-3 bg-zinc-950/75 backdrop-blur-xl p-6 md:p-8 rounded-2xl border border-pink-950/30 shadow-2xl shadow-pink-950/10">
        <div class="border-b border-pink-900/30 pb-5 mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <div class="text-[10px] font-mono text-pink-500 tracking-widest uppercase mb-1 flex items-center gap-1.5">
                    <span class="inline-block w-1.5 h-1.5 bg-pink-500 rounded-full animate-ping"></span>
                    // MATRIX COMBINED CATALOG SYSTEM
                </div>
                <h1 class="text-2xl md:text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-pink-400 via-rose-400 to-fuchsia-400 font-mono">
                    實體通訊矩陣：觀測網目錄
                </h1>
                <p class="text-xs text-pink-300/50 mt-1.5">數據源：已同步至後端本地 data/combined_data/[伺服器節點] 集中儲存槽</p>
            </div>
            <div class="flex flex-wrap gap-2">
                <a href="hub.html" class="bg-zinc-900/60 hover:bg-pink-950/30 border border-pink-900/40 text-pink-300/80 hover:text-pink-300 text-xs px-3 py-1.5 rounded-lg font-mono transition-all duration-200 hover:scale-105">
                    [ 主控樞紐 ]
                </a>
                <a href="index.html" class="bg-zinc-900/60 hover:bg-pink-950/30 border border-pink-900/40 text-pink-300/80 hover:text-pink-300 text-xs px-3 py-1.5 rounded-lg font-mono transition-all duration-200 hover:scale-105">
                    [ 核心同步 ]
                </a>
                <a href="friend_form.html" class="bg-pink-950/40 hover:bg-pink-900/50 border border-pink-500/40 text-pink-200 text-xs px-3 py-1.5 rounded-lg font-mono transition-all duration-200 hover:scale-105 shadow-[0_0_10px_rgba(244,114,182,0.15)]">
                    [ + 新增節點 ]
                </a>
                <div id="statusBadge" class="bg-zinc-900/80 border border-pink-500/30 px-3 py-1.5 rounded-lg text-xs font-mono text-pink-400 animate-pulse tracking-wider">NODE CONNECTING</div>
            </div>
        </div>

        <div class="space-y-4 mb-6">
            <div class="relative">
                <input type="text" id="searchInput" class="w-full bg-zinc-900/40 border border-pink-900/40 rounded-xl px-4 py-3.5 pl-10 text-sm cyber-border text-pink-100 placeholder-pink-300/20 transition-all" placeholder="輸入識別名稱、核心小名、連線型態或伺服器節點進行矩陣檢索...">
                <div class="absolute left-3 top-4 text-pink-500/50 font-mono text-xs">//</div>
            </div>
            
            <div class="flex flex-wrap gap-2 p-1 bg-black/40 border border-zinc-900 rounded-xl font-mono text-xs text-pink-300/60">
                <button onclick="setFilter('all')" id="filter-all" class="filter-btn active px-3 py-2 rounded-lg hover:text-pink-300 transition">全部 (ALL)</button>
                <button onclick="setFilter('physical')" id="filter-physical" class="filter-btn px-3 py-2 rounded-lg hover:text-pink-300 transition">現實實體 (PHYSICAL)</button>
                <button onclick="setFilter('virtual')" id="filter-virtual" class="filter-btn px-3 py-2 rounded-lg hover:text-pink-300 transition">虛擬存在 (VIRTUAL)</button>
                <button onclick="setFilter('hybrid')" id="filter-hybrid" class="filter-btn px-3 py-2 rounded-lg hover:text-pink-300 transition">跨界混合 (HYBRID)</button>
                <button onclick="setFilter('confidential')" id="filter-confidential" class="filter-btn px-3 py-2 rounded-lg hover:text-rose-400 transition flex items-center gap-1">🔒 保密節點 (RESTRICTED)</button>
            </div>
        </div>

        <div id="contactContainer" class="space-y-3.5 transition-opacity duration-300">
            <div class="text-pink-400/50 text-xs text-center py-12 font-mono tracking-widest animate-pulse">
                ⚡ SEARCHING FOR MATRIX REACTION... 正在從集中儲存槽初始化數據...
            </div>
        </div>
    </div>

    <div class="md:col-span-1 bg-zinc-950/75 backdrop-blur-xl p-5 rounded-2xl border border-pink-950/30 shadow-2xl shadow-pink-950/10 flex flex-col h-fit">
        <div class="text-[10px] font-mono text-pink-400 tracking-widest uppercase mb-1">// ANNIHILATION COUNTDOWN</div>
        <h2 class="text-base font-bold font-mono tracking-wide mb-3 border-b border-pink-900/30 pb-2 text-pink-300 flex items-center gap-1">
            🎂 誕期波長逆推
        </h2>
        <div id="countdownContainer" class="space-y-3 max-h-[600px] overflow-y-auto pr-1">
            <div class="text-zinc-500 text-[11px] font-mono italic">// 監聽矩陣中...</div>
        </div>
    </div>

</div>

<script>
const API_ENDPOINT = 'http://127.0.0.1:5000/api/friends';
let allEntities = [];
let currentFilter = 'all'; 
let countdownInterval = null; 
let activeTimersCache = []; 

function toggleExpand(tagElement, event) {
    const currentWrapper = tagElement.parentElement;
    const panel = currentWrapper.querySelector('.detail-panel');
    const arrow = tagElement.querySelector('.arrow-icon');
    const isOpening = !tagElement.classList.contains('active');
    const allCards = document.querySelectorAll('#contactContainer > div');

    // 🚀 量子衝擊波漣漪特效觸發
    if (event) {
        const rect = tagElement.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;
        const ripple = document.createElement('div');
        ripple.className = 'matrix-ripple';
        ripple.style.left = `${x}px`;
        ripple.style.top = `${y}px`;
        const size = Math.max(rect.width, rect.height);
        ripple.style.width = `${size}px`;
        ripple.style.height = `${size}px`;
        tagElement.appendChild(ripple);
        setTimeout(() => ripple.remove(), 450);
    }

    if (isOpening) {
        allCards.forEach(card => {
            if (card !== currentWrapper) {
                const cardHeader = card.querySelector('.group');
                const cardPanel = card.querySelector('.detail-panel');
                const cardArrow = card.querySelector('.arrow-icon');
                
                if (cardHeader && cardHeader.classList.contains('active')) {
                    cardHeader.classList.remove('active');
                    cardPanel.classList.remove('open');
                    if (cardArrow) cardArrow.style.transform = 'rotate(0deg)';
                    cardPanel.style.borderTopColor = 'transparent';
                }
                card.classList.add('opacity-40', 'scale-95');
                card.classList.remove('scale-[1.02]', 'z-20', card.dataset.focusClass);
            }
        });

        tagElement.classList.add('active');
        panel.classList.add('open');
        arrow.style.transform = 'rotate(180deg)';
        panel.style.borderTopColor = 'rgba(244, 114, 182, 0.15)';
        
        currentWrapper.classList.remove('opacity-40', 'scale-95');
        currentWrapper.classList.add('scale-[1.02]', 'z-20', currentWrapper.dataset.focusClass);
    } else {
        tagElement.classList.remove('active');
        panel.classList.remove('open');
        arrow.style.transform = 'rotate(0deg)';
        panel.style.borderTopColor = 'transparent';

        allCards.forEach(card => {
            card.classList.remove('opacity-40', 'scale-95', 'scale-[1.02]', 'z-20', card.dataset.focusClass);
        });
    }
}

function setFilter(filterType) {
    currentFilter = filterType;
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`filter-${filterType}`).classList.add('active');
    
    const container = document.getElementById('contactContainer');
    container.style.opacity = '0.4';
    setTimeout(() => {
        filterAndRender();
        container.style.opacity = '1';
    }, 150);
}

let searchTimeout;
document.getElementById('searchInput').addEventListener('input', function() {
    const container = document.getElementById('contactContainer');
    container.style.opacity = '0.5';
    
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
        filterAndRender();
        container.style.opacity = '1';
    }, 200);
});

function editEntity(name) {
    setTimeout(() => {
        window.location.href = `friend_form.html?edit=${name}`;
    }, 150);
}

async function deleteEntity(name) {
    if (!confirm(`【安全警告】是否確定中斷與實體「${decodeURIComponent(name)}」的共振連線？\n此動作將全方位抹除原路徑與 combined_data 集中儲存槽內的所有數據。`)) return;
    try {
        const response = await fetch(`${API_ENDPOINT}/${name}`, { method: 'DELETE' });
        if (response.ok) {
            alert("【全域連線已中斷】雙軌儲存槽內的檔案皆已抹除完畢。");
            await fetchEntities();
        } else {
            showError("核心伺服器拒絕了中斷請求。");
        }
    } catch (err) {
        showError("無法與核心伺服器連線，請檢查通訊協定。");
    }
}

function showError(msg) {
    document.getElementById('contactContainer').innerHTML = `
        <div class="text-rose-400 border border-rose-900/30 bg-rose-950/20 p-5 rounded-xl text-center font-mono text-sm shadow-[0_0_15px_rgba(244,63,94,0.1)]">
            💥 【系統異常】${msg}
        </div>`;
}

async function fetchEntities() {
    try {
        const response = await fetch(API_ENDPOINT);
        if (response.ok) {
            allEntities = await response.json();
            document.getElementById('statusBadge').textContent = 'MATRIX ONLINE';
            document.getElementById('statusBadge').classList.remove('animate-pulse');
            document.getElementById('statusBadge').className = "bg-pink-950/30 border border-pink-500/50 px-3 py-1.5 rounded-lg text-xs font-mono text-pink-400 shadow-[0_0_10px_rgba(244,114,182,0.2)]";
            
            filterAndRender();
            setupBirthdaySidebar(); 
        } else {
            showError("無法讀取遠端節點資料，狀態碼異常。");
            setNodeOffline();
        }
    } catch (err) {
        showError("連線伺服器超時，請確認伺服器 app.py 是否正常啟動。");
        setNodeOffline();
    }
}

function setNodeOffline() {
    const badge = document.getElementById('statusBadge');
    badge.textContent = 'MATRIX OFFLINE';
    badge.classList.remove('animate-pulse');
    badge.className = "bg-rose-950/40 border border-rose-800 text-rose-400 px-3 py-1.5 rounded-lg text-xs font-mono shadow-[0_0_10px_rgba(225,29,72,0.2)]";
}

function setupBirthdaySidebar() {
    if (countdownInterval) clearInterval(countdownInterval);
    activeTimersCache = [];

    const container = document.getElementById('countdownContainer');
    const now = new Date();

    const validEntities = allEntities.filter(entity => {
        const isConf = entity.is_confidential === true || entity.status === '保密';
        return !isConf && entity.birthday && entity.birthday.trim() !== '';
    });

    if (validEntities.length === 0) {
        container.innerHTML = '<div class="text-zinc-600 text-[11px] font-mono italic">// 暫無公開的誕生週期數據</div>';
        return;
    }

    const initialStructureData = [];

    validEntities.forEach((entity, index) => {
        const parts = entity.birthday.split(/[-/]/);
        if (parts.length < 2) return;

        const month = parseInt(parts[parts.length - 2], 10);
        const day = parseInt(parts[parts.length - 1], 10);
        if (isNaN(month) || isNaN(day)) return;

        let targetBirthday = new Date(now.getFullYear(), month - 1, day, 0, 0, 0);
        if (targetBirthday < now) {
            targetBirthday.setFullYear(now.getFullYear() + 1);
        }

        initialStructureData.push({
            id: `bday-${index}-${Date.now()}`,
            name: entity.name,
            nickname: entity.nickname,
            targetDate: targetBirthday,
            month: month,
            day: day
        });
    });

    initialStructureData.sort((a, b) => a.targetDate - b.targetDate);

    container.innerHTML = initialStructureData.map(item => {
        const dispName = item.name + (item.nickname ? ` (${item.nickname})` : '');
        return `
            <div class="p-3 bg-zinc-900/30 border border-pink-950/20 rounded-xl hover:border-pink-900/40 transition duration-200" id="${item.id}">
                <div class="text-xs font-bold text-pink-100 font-mono truncate mb-1">${dispName}</div>
                <div class="grid grid-cols-5 text-center gap-1 font-mono text-[10px] text-zinc-400 mt-1.5" id="${item.id}-timer">
                    <div class="bg-black/40 p-1 rounded border border-zinc-900"><span class="text-pink-400 block font-bold text-xs shadow-span" data-unit="M">0</span>M</div>
                    <div class="bg-black/40 p-1 rounded border border-zinc-900"><span class="text-pink-400 block font-bold text-xs shadow-span" data-unit="D">0</span>D</div>
                    <div class="bg-black/40 p-1 rounded border border-zinc-900"><span class="text-pink-400 block font-bold text-xs shadow-span" data-unit="H">0</span>H</div>
                    <div class="bg-black/40 p-1 rounded border border-zinc-900"><span class="text-pink-400 block font-bold text-xs shadow-span" data-unit="Min">0</span>M</div>
                    <div class="bg-black/40 p-1 rounded border border-zinc-900"><span class="text-rose-400 block font-bold text-xs pulse-text shadow-span" data-unit="S">0</span>S</div>
                </div>
                <div class="hidden text-center text-[10px] text-pink-400 font-mono tracking-widest py-1 bg-pink-950/20 border border-pink-500/30 rounded mt-1.5 animate-pulse" id="${item.id}-celebrate">
                    🎉 MATRIX RECONSTRUCTING: CELEBRATING NOW
                </div>
            </div>
        `;
    }).join('');

    initialStructureData.forEach(item => {
        const parent = document.getElementById(item.id);
        if (!parent) return;
        
        activeTimersCache.push({
            id: item.id,
            targetDate: item.targetDate,
            month: item.month,
            day: item.day,
            timerGrid: document.getElementById(`${item.id}-timer`),
            celebratePanel: document.getElementById(`${item.id}-celebrate`),
            mNode: parent.querySelector('[data-unit="M"]'),
            dNode: parent.querySelector('[data-unit="D"]'),
            hNode: parent.querySelector('[data-unit="H"]'),
            minNode: parent.querySelector('[data-unit="Min"]'),
            sNode: parent.querySelector('[data-unit="S"]')
        });
    });

    tickCountdowns();
    countdownInterval = setInterval(tickCountdowns, 1000);
}

function tickCountdowns() {
    const now = new Date();
    let structureNeedsReset = false;

    activeTimersCache.forEach(item => {
        if (item.targetDate < now) {
            structureNeedsReset = true;
            return;
        }

        if (now.getMonth() === (item.month - 1) && now.getDate() === item.day) {
            if (item.timerGrid && !item.timerGrid.classList.contains('hidden')) {
                item.timerGrid.classList.add('hidden');
                item.celebratePanel.classList.remove('hidden');
            }
            return;
        } else {
            if (item.timerGrid && item.timerGrid.classList.contains('hidden')) {
                item.timerGrid.classList.remove('hidden');
                item.celebratePanel.classList.add('hidden');
            }
        }

        let tempDate = new Date(now.getTime());
        let months = 0;
        while (true) {
            let nextMonth = new Date(tempDate.getFullYear(), tempDate.getMonth() + 1, tempDate.getDate(), tempDate.getHours(), tempDate.getMinutes(), tempDate.getSeconds());
            if (nextMonth > item.targetDate) break;
            months++;
            tempDate = nextMonth;
        }

        const diffMs = item.targetDate - tempDate;
        const totalSeconds = Math.floor(diffMs / 1000);
        
        const seconds = totalSeconds % 60;
        const totalMinutes = Math.floor(totalSeconds / 60);
        const minutes = totalMinutes % 60;
        const totalHours = Math.floor(totalMinutes / 60);
        const hours = totalHours % 24;
        const days = Math.floor(totalHours / 24);

        if(item.mNode.textContent !== String(months)) item.mNode.textContent = months;
        if(item.dNode.textContent !== String(days)) item.dNode.textContent = days;
        
        const padH = String(hours).padStart(2, '0');
        if(item.hNode.textContent !== padH) item.hNode.textContent = padH;
        
        const padMin = String(minutes).padStart(2, '0');
        if(item.minNode.textContent !== padMin) item.minNode.textContent = padMin;
        
        item.sNode.textContent = String(seconds).padStart(2, '0');
    });

    if (structureNeedsReset) {
        setupBirthdaySidebar();
    }
}

function filterAndRender() {
    const query = document.getElementById('searchInput').value.toLowerCase().trim();
    const container = document.getElementById('contactContainer');
    container.innerHTML = '';

    const filtered = allEntities.filter(entity => {
        const name = (entity.name || '').toLowerCase();
        const nickname = (entity.nickname || '').toLowerCase();
        const rel = (entity.relationship || '').toLowerCase();
        const node = (entity.server_node || '').toLowerCase();
        
        const matchesSearch = name.includes(query) || nickname.includes(query) || rel.includes(query) || node.includes(query);
        if (!matchesSearch) return false;

        const exType = entity.existence_type || '現實實體';
        if (currentFilter === 'physical') return exType === '現實實體' && !entity.is_confidential && entity.status !== '保密';
        if (currentFilter === 'virtual') return exType === '虛擬存在' && !entity.is_confidential && entity.status !== '保密';
        if (currentFilter === 'hybrid') return exType === '跨界混合' && !entity.is_confidential && entity.status !== '保密';
        if (currentFilter === 'confidential') return entity.is_confidential === true || entity.status === '保密';
        
        return true; 
    });

    const typeWeights = { 'confidential': 1, '現實實體': 2, '虛擬存在': 3, '跨界混合': 4 };

    filtered.sort((a, b) => {
        const aIsConf = a.is_confidential || a.status === '保密';
        const bIsConf = b.is_confidential || b.status === '保密';
        const aTypeKey = aIsConf ? 'confidential' : (a.existence_type || '現實實體');
        const bTypeKey = bIsConf ? 'confidential' : (b.existence_type || '現實實體');
        return (typeWeights[aTypeKey] || 99) - (typeWeights[bTypeKey] || 99);
    });

    if (filtered.length === 0) {
        container.innerHTML = '<div class="text-pink-300/30 text-xs text-center py-12 font-mono border border-dashed border-zinc-900 rounded-xl">// 🛸 未檢索到任何符合的矩陣節點或當前分類為空</div>';
        return;
    }

    const fragment = document.createDocumentFragment();

    filtered.forEach(entity => {
        const isConf = entity.is_confidential || entity.status === '保密';
        const exType = entity.existence_type || '現實實體';
        
        let badgeClass = '', badgeText = '', cardBorder = '', focusClass = '';

        if (isConf) {
            badgeClass = 'border-rose-500/40 bg-rose-950/30 text-rose-400 shadow-[0_0_6px_rgba(244,63,94,0.2)]';
            badgeText = '🔒 RESTRICTED';
            cardBorder = 'border-rose-950/30 bg-rose-950/5';
            focusClass = 'focus-confidential';
        } else if (exType === '虛擬存在') {
            badgeClass = 'border-cyan-500/40 bg-cyan-950/30 text-cyan-400 shadow-[0_0_6px_rgba(34,211,238,0.2)]';
            badgeText = 'VIRTUAL';
            cardBorder = 'border-cyan-950/30 bg-cyan-950/5';
            focusClass = 'focus-virtual';
        } else if (exType === '跨界混合') {
            badgeClass = 'border-fuchsia-500/40 bg-fuchsia-950/30 text-fuchsia-400 shadow-[0_0_6px_rgba(217,70,239,0.2)]';
            badgeText = 'HYBRID';
            cardBorder = 'border-fuchsia-950/30 bg-fuchsia-950/5';
            focusClass = 'focus-hybrid';
        } else {
            badgeClass = 'border-emerald-500/40 bg-emerald-950/30 text-emerald-400 shadow-[0_0_6px_rgba(16,185,129,0.2)]';
            badgeText = 'PHYSICAL';
            cardBorder = 'border-emerald-950/30 bg-emerald-950/5';
            focusClass = 'focus-physical';
        }

        const itemDiv = document.createElement('div');
        itemDiv.className = `border ${cardBorder} rounded-xl p-4.5 space-y-2.5 cyber-border relative overflow-hidden link-item`;
        itemDiv.dataset.focusClass = focusClass;

        // 🚀 特效輔助層：全像炫光掃過
        const shimmer = document.createElement('div');
        shimmer.className = 'shimmer-layer';
        itemDiv.appendChild(shimmer);

        const headerRow = document.createElement('div');
        headerRow.className = 'flex justify-between items-center cursor-pointer select-none group relative z-10';
        headerRow.onclick = (e) => toggleExpand(headerRow, e);

        const titleSection = document.createElement('div');
        titleSection.className = 'flex items-center gap-2.5';
        
        const nameSpan = document.createElement('span');
        nameSpan.className = 'text-base font-bold text-pink-50 font-mono tracking-wide group-hover:text-pink-300 transition-colors duration-200 glitch-hover';
        nameSpan.textContent = (entity.name || 'Unknown') + (entity.nickname ? ` (${entity.nickname})` : '');

        const typeBadge = document.createElement('span');
        typeBadge.className = `text-[9px] px-1.5 py-[2px] rounded font-mono tracking-widest ${badgeClass}`;
        typeBadge.textContent = badgeText;

        titleSection.appendChild(nameSpan);
        titleSection.appendChild(typeBadge);

        if (isConf && exType !== '保密狀態') {
            const confBadge = document.createElement('span');
            confBadge.className = 'text-[9px] px-1.5 py-[2px] rounded font-mono border border-rose-900/60 bg-rose-950/50 text-rose-400 shadow-[0_0_6px_rgba(244,63,94,0.2)]';
            confBadge.textContent = '🔒 CONFIDENTIAL';
            titleSection.appendChild(confBadge);
        }

        const arrowSpan = document.createElement('span');
        arrowSpan.className = 'arrow-icon text-pink-400/60 group-hover:text-pink-400 font-mono text-xs';
        arrowSpan.innerHTML = '▼';

        headerRow.appendChild(titleSection);
        headerRow.appendChild(arrowSpan);

        const detailPanel = document.createElement('div');
        detailPanel.className = 'detail-panel space-y-4 text-xs pt-3 relative z-10';

        if (isConf) {
            detailPanel.innerHTML = `
                <div class="text-rose-400/80 p-3.5 border border-rose-950/40 bg-rose-950/20 rounded-lg font-mono text-center tracking-wide leading-relaxed">
                    🔒 [已啟動安全防禦協定] 該實體核心參數與關聯網已於 combined_data 目錄中哈希灰階化。其餘資料拒絕公開。
                </div>
                <div class="flex justify-end gap-2 pt-1">
                    <button onclick="editEntity('${encodeURIComponent(entity.name)}')" class="border border-yellow-600/40 text-yellow-400/90 hover:text-yellow-400 hover:bg-yellow-500/10 px-3 py-1.5 rounded-lg text-xs font-mono transition-all active:scale-95">修改參數</button>
                    <button onclick="deleteEntity('${encodeURIComponent(entity.name)}')" class="border border-rose-600/40 text-rose-400/90 hover:text-rose-400 hover:bg-rose-500/10 px-3 py-1.5 rounded-lg text-xs font-mono transition-all active:scale-95">中斷連線</button>
                </div>`;
        } else {
            let relsHtml = '<span class="text-zinc-600 italic font-mono text-[11px]">尚無關聯紀錄</span>';
            if (entity.matrix_relations && Object.keys(entity.matrix_relations).length > 0) {
                relsHtml = Object.entries(entity.matrix_relations).map(([target, tags]) => {
                    return `<div class="bg-black/40 border border-pink-950/20 px-2.5 py-1.5 rounded-lg flex items-center justify-between font-mono hover:border-pink-900/40 transition">
                        <span class="text-pink-300/90">⟷ ${target}</span>
                        <span class="text-pink-400/70 text-[11px] bg-pink-950/30 px-1.5 py-0.5 rounded border border-pink-950/40">${(tags || []).join(' + ')}</span>
                    </div>`;
                }).join('');
            }

            let memoriesHtml = '<span class="text-zinc-600 italic font-mono text-[11px]">尚無共同回憶紀錄</span>';
            if (entity.shared_memories && entity.shared_memories.length > 0) {
                const sortedMemories = [...entity.shared_memories].sort((a, b) => {
                    if (a.category !== b.category) {
                        return a.category.localeCompare(b.category, 'zh-TW');
                    }
                    return a.type.localeCompare(b.type, 'zh-TW');
                });

                memoriesHtml = sortedMemories.map(mem => {
                    return `<div class="bg-black/40 border border-pink-950/20 px-2.5 py-1.5 rounded-lg flex items-center justify-between font-mono hover:border-pink-900/40 transition gap-2">
                        <div class="flex items-center gap-2 truncate">
                            <span class="text-pink-400 font-mono text-[10px] bg-pink-950/50 border border-pink-800/40 px-1.5 py-0.5 rounded shrink-0">${mem.category}</span>
                            <span class="text-pink-300/60 text-[11px] shrink-0">[${mem.type}]</span>
                            <span class="text-pink-100 font-bold truncate tracking-wide">${mem.name}</span>
                        </div>
                    </div>`;
                }).join('');
            }

            const wave = entity.initial_wavelength || '穩定共鳴';
            const resonance = entity.resonance_effect !== undefined ? entity.resonance_effect : '0.5';
            const affinity = entity.affinity_to_rio || '中立觀察';

            detailPanel.innerHTML = `
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 bg-black/30 p-3.5 rounded-xl border border-pink-950/10">
                    <div><span class="text-pink-500/50 font-mono">// 性別標籤：</span><span class="text-zinc-200 font-mono">${entity.gender || '未定義'}</span></div>
                    <div><span class="text-pink-500/50 font-mono">// 核心年齡：</span><span class="text-zinc-200 font-mono">${entity.age !== null && entity.age !== undefined ? entity.age : '未填'}</span></div>
                    <div><span class="text-pink-500/50 font-mono">// 誕生週期：</span><span class="text-zinc-200 font-mono">${entity.birthday || '未設定'}</span></div>
                    <div><span class="text-pink-500/50 font-mono">// 儲存節點：</span><span class="text-pink-400 font-mono">combined_data/${entity.server_node || 'default'}</span></div>
                    <div><span class="text-pink-500/50 font-mono">// 關係鏈結：</span><span class="text-zinc-200 font-mono">${entity.relationship || '常規通道'}</span></div>
                    <div><span class="text-pink-500/50 font-mono">// 親密共振：</span><span class="text-zinc-200 font-mono">${affinity}</span></div>
                    <div class="sm:col-span-2"><span class="text-pink-500/50 font-mono">// 脈衝波長：</span><span class="text-zinc-200 font-mono">${wave}</span></div>
                    <div><span class="text-pink-500/50 font-mono">// 共振強度：</span><span class="text-pink-400 font-bold font-mono pulse-text">${resonance}</span></div>
                    ${entity.first_encounter ? `<div class="sm:col-span-3"><span class="text-pink-500/50 font-mono">// 初識日期：</span><span class="text-zinc-200 font-mono">${entity.first_encounter}</span></div>` : ''}
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <div class="text-pink-500/50 font-mono">// 跨節點陣列交織網路：</div>
                        <div class="max-h-36 overflow-y-auto space-y-1.5 pr-1">${relsHtml}</div>
                    </div>
                    <div class="space-y-1.5">
                        <div class="text-pink-500/50 font-mono">// 共同回憶共振矩陣 (已排序排列)：</div>
                        <div class="max-h-36 overflow-y-auto space-y-1.5 pr-1">${memoriesHtml}</div>
                    </div>
                </div>

                ${(entity.existence_type === '現實實體') ? `
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 text-[11px] bg-black/60 p-2 rounded-lg border border-zinc-900 font-mono">
                    <div class="overflow-hidden"><span class="text-zinc-500 block text-[10px]">Discord:</span><span class="text-zinc-300 truncate block">${entity.discord_id || '-'}</span></div>
                    <div class="overflow-hidden"><span class="text-zinc-500 block text-[10px]">LINE:</span><span class="text-zinc-300 truncate block">${entity.line_id || '-'}</span></div>
                    <div class="overflow-hidden"><span class="text-zinc-500 block text-[10px]">WeChat:</span><span class="text-zinc-300 truncate block">${entity.wechat_id || '-'}</span></div>
                    <div class="overflow-hidden"><span class="text-zinc-500 block text-[10px]">QQ:</span><span class="text-zinc-300 truncate block">${entity.qq_id || '-'}</span></div>
                </div>` : ''}

                <div class="flex justify-end gap-2 pt-1 border-t border-zinc-900/60">
                    <button onclick="editEntity('${encodeURIComponent(entity.name)}')" class="border border-yellow-600/40 text-yellow-400/90 hover:text-yellow-400 hover:bg-yellow-500/10 px-3 py-1.5 rounded-lg text-xs font-mono transition-all active:scale-95">修改參數</button>
                    <button onclick="deleteEntity('${encodeURIComponent(entity.name)}')" class="border border-rose-600/40 text-rose-400/90 hover:text-rose-400 hover:bg-rose-500/10 px-3 py-1.5 rounded-lg text-xs font-mono transition-all active:scale-95">中斷連線</button>
                </div>`;
        }

        itemDiv.appendChild(headerRow);
        itemDiv.appendChild(detailPanel);

        // 🚀 監聽：滑鼠座標偏轉動態計算 (3D Perspective Tilt)
        itemDiv.addEventListener('mousemove', (e) => {
            const rect = itemDiv.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const xc = rect.width / 2;
            const yc = rect.height / 2;
            
            // 計算最大偏轉角度 ±4.5 度
            const angleX = ((yc - y) / yc) * 4.5;
            const angleY = ((x - xc) / xc) * 4.5;
            
            // 判定目前卡片是否展開，展開時縮小晃動率，避免影響操作
            const isOpened = headerRow.classList.contains('active');
            const dampener = isOpened ? 0.2 : 1;
            
            itemDiv.style.transform = `perspective(800px) rotateX(${angleX * dampener}deg) rotateY(${angleY * dampener}deg) translateY(${isOpened ? 0 : -2}px)`;
        });
        
        // 滑鼠離開時重置偏轉狀態
        itemDiv.addEventListener('mouseleave', () => {
            itemDiv.style.transform = '';
        });

        fragment.appendChild(itemDiv);
    });

    container.appendChild(fragment);
}

window.addEventListener('DOMContentLoaded', () => {
    fetchEntities();
});
</script>
</body>
</html>
